<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; }
body {
    background: #0a0a14;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 50px 60px;
    overflow: hidden;
    position: relative;
}
.label {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #c9a876;
    margin-bottom: 32px;
}
.title {
    font-size: 124px;
    font-weight: 900;
    color: #f5f2ed;
    letter-spacing: -3.5px;
    line-height: 0.92;
}
.signature {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.6px;
    margin-top: 36px;
    color: #f5f2ed;
}
.signature .gold { color: #c9a876; }
.cities {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6b6560;
}
</style>
</head>
<body>
    <div class="label">Private Speech Advisory</div>
    <div class="title">CARTE<br>BLANCHE</div>
    <div class="signature">Sharpness. Density. <span class="gold">Precision.</span></div>
    <div class="cities">Paris · Singapore · Shanghai · Hong Kong · Seoul · Tokyo</div>
</body>
</html>
