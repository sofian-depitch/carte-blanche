<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 1200px; }
body {
    background: #0c0c0c;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.logo {
    font-size: 240px;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -10px;
    text-transform: uppercase;
    color: #f5f2ed;
    text-align: center;
}
.logo .gold { color: #c9a876; }
</style>
</head>
<body>
<div class="logo">Hyper<br><span class="gold">Stition</span></div>
</body>
</html>
