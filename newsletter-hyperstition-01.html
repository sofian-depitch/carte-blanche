<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; }
body {
    background: #0c0c0c;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
}

/* Subtle warm light radial upper-right */
body::before {
    content: '';
    position: absolute;
    top: -260px;
    right: -260px;
    width: 720px;
    height: 720px;
    background: radial-gradient(circle, rgba(201,168,118,0.10) 0%, rgba(201,168,118,0.04) 35%, transparent 65%);
    pointer-events: none;
}

.eyebrow {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 4.5px;
    text-transform: uppercase;
    color: #c9a876;
}

.hero {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    text-align: center;
}

.title {
    font-size: 76px;
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: -2.6px;
    text-transform: uppercase;
    color: #f5f2ed;
}

.title .gold { color: #c9a876; }

.divider {
    width: 60px;
    height: 1px;
    background: #c9a876;
    margin: 38px auto 26px;
}

.sub {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    line-height: 1.6;
    color: #c8c3bc;
    font-weight: 400;
    letter-spacing: 0.01em;
}

.signature {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8c3bc;
}
</style>
</head>
<body>
    <div class="eyebrow">Hyperstition · 01</div>
    <div class="hero">
        <div class="title">The Grammar<br>That Kills<br><span class="gold">The Future</span></div>
        <div class="divider"></div>
        <div class="sub">Future tense plants doubt.<br>Present tense plants reality.</div>
    </div>
    <div class="signature">by Carte Blanche</div>
</body>
</html>
